name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      # 反向連線後已不需 cloudflared（節點主動連 PAI long-poll）。不再打包 ~60MB binary →
      # build/上傳/下載/安裝都變快、APK 大幅縮小、也不再因下載 cloudflared 504 而失敗。

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pai-gateway-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: PAI Gateway v1.0.${{ github.run_number }}
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
